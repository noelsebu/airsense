spring.application.name=airsense

# H2 Database (file-based so data survives restarts)
spring.datasource.url=jdbc:h2:file:./data/airsense;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 Console (dev convenience)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Thymeleaf
spring.thymeleaf.cache=false

# Simulator
airsense.simulator.enabled=true
airsense.simulator.interval-ms=10000
airsense.simulator.devices-per-location=3

# Server
server.port=8080
