<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>500 — AirSense</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0f1117;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .code {
            font-size: 6rem;
            font-weight: 800;
            color: #6ee7b7;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.75rem; margin: 0 0 0.75rem; }
        p { color: #94a3b8; margin: 0 0 2rem; }
        a {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: #6ee7b7;
            color: #0f1117;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover { background: #a7f3d0; }
        .icon { margin: 1.5rem 0; opacity: 0.2; }
    </style>
</head>
<body>
    <div class="code">500</div>
    <h1>Internal Server Error</h1>
    <p>Something went wrong on our end. Please try again.</p>
    <div class="icon">
        <svg width="64" height="64" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" stroke="#6ee7b7" stroke-width="2"/>
            <circle cx="14" cy="14" r="7" fill="#6ee7b7" opacity="0.3"/>
            <circle cx="14" cy="14" r="3" fill="#6ee7b7"/>
        </svg>
    </div>
    <a href="/">Back to Dashboard</a>
</body>
</html>
