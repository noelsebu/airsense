<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Add Device')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width: 600px;">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Dashboard</a></li>
            <li class="breadcrumb-item active">Add Device</li>
        </ol>
    </nav>

    <h3 class="mb-4">Add Device</h3>

    <form th:action="@{/devices}" method="post" th:object="${form}">
        <input type="hidden" name="locationId" th:value="${locationId}"/>

        <div class="mb-3">
            <label class="form-label" for="serialNumber">Serial Number</label>
            <input type="text" class="form-control" id="serialNumber" th:field="*{serialNumber}" required
                   placeholder="e.g. SN-2960001234"/>
        </div>

        <div class="mb-3">
            <label class="form-label" for="deviceType">Device Type</label>
            <select class="form-select" id="deviceType" th:field="*{deviceType}">
                <option th:each="type : ${deviceTypes}" th:value="${type}" th:text="${type.displayName}">View Plus</option>
            </select>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label class="form-label" for="roomName">Room Name</label>
                <input type="text" class="form-control" id="roomName" th:field="*{roomName}"
                       placeholder="e.g. Open Office, Meeting Room A"/>
            </div>
            <div class="col-4">
                <label class="form-label" for="floor">Floor</label>
                <input type="number" class="form-control" id="floor" th:field="*{floor}" min="0" max="100"/>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Add Device</button>
            <a th:href="@{/locations/{id}(id=${locationId})}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
