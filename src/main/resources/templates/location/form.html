<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Location')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width: 600px;">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Dashboard</a></li>
            <li class="breadcrumb-item active" th:text="${locationId != null ? 'Edit Location' : 'New Location'}">New Location</li>
        </ol>
    </nav>

    <h3 th:text="${locationId != null ? 'Edit Location' : 'New Location'}" class="mb-4">New Location</h3>

    <form th:action="${locationId != null ? '/locations/' + locationId : '/locations'}" method="post" th:object="${form}">

        <div class="mb-3">
            <label class="form-label" for="name">Name</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required placeholder="e.g. Oslo HQ"/>
        </div>

        <div class="mb-3">
            <label class="form-label" for="address">Address</label>
            <input type="text" class="form-control" id="address" th:field="*{address}" placeholder="e.g. Wergelandsveien 7, 0167 Oslo"/>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label class="form-label" for="floors">Floors</label>
                <input type="number" class="form-control" id="floors" th:field="*{floors}" min="1" max="100"/>
            </div>
            <div class="col">
                <label class="form-label" for="buildingType">Building Type</label>
                <select class="form-select" id="buildingType" th:field="*{buildingType}">
                    <option th:each="type : ${buildingTypes}" th:value="${type}" th:text="${type}">OFFICE</option>
                </select>
            </div>
            <div class="col">
                <label class="form-label" for="ventilationType">Ventilation</label>
                <select class="form-select" id="ventilationType" th:field="*{ventilationType}">
                    <option th:each="type : ${ventilationTypes}" th:value="${type}" th:text="${type}">MECHANICAL</option>
                </select>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
